name: Test and Analyze with Triggers and SonarCloud
description: Run node tests based on triggers, optional SonarCloud
branding:
  icon: check-square
  color: blue

inputs:
  ### Required
  commands:
    description: Commands to run tests, start with '|' for multi-line
    required: true

  dir:
    description: App/package directory
    required: true

  node_version:
    description: Node version to use (e.g., '24')
    default: "24"

  java_version:
    description: Java version to use (e.g., '21')
    default: "21"

  java_distribution:
    description: Java distribution to use (e.g., temurin)
    default: "temurin"

  python_version:
    description: Python version to use (e.g., '3.12')
    default: "3.12"

  language:
    description: "Primary language of the project. Options: node (default), java, python"
    default: "node"

  ### Typical / recommended
  cache:
    description: Package manager for caching; e.g. npm, yarn, pnpm
    default: npm

  sonar_args:
    # https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
    description: SonarCloud command line arguments
    default: |
      -Dsonar.organization=bcgov-sonarcloud
      -Dsonar.projectKey=bcgov_${{ github.repository }}

  sonar_token:
    description: Sonar token, provide unpopulated token for pre-setup (will skip)

  triggers:
    description: Paths (array) used to trigger a build; e.g. ('./backend/' './frontend/)

  supply_scan:
    description: Enable supply chain attack detection using @aikidosec/safe-chain
    default: "true"

  dep_scan:
    description: "Enable dependency and export analysis using Knip for JS/TS projects. Options: off (skip), warn (run but don't fail, default), error (run and fail on issues)"
    default: "warn"

  knip_config:
    description: "Path to custom Knip configuration file (relative to workspace root). If not provided, uses action's default configuration"
    default: ""

  ### Usually a bad idea / not recommended
  diff_branch:
    description: Branch to diff against
    default: ${{ github.event.repository.default_branch }}

  repository:
    description: Non-default repository to clone (used for testing this action)
    default: ${{ github.repository }}

  branch:
    description: Non-default branch to clone (used for testing this action)
    default: ""

  skip_checkout:
    description: "Skip the internal checkout step. Useful for self-testing or when the project is already checked out."
    default: "false"

  checkout_path:
    description: "Path where the repository should be checked out. Default is current directory."
    default: "."

outputs:
  triggered:
    description: Whether the action was triggered based on path changes
    value: ${{ steps.final_triggered.outputs.triggered }}
  unused_files:
    description: Number of unused files found by Knip
    value: ${{ steps.analysis.outputs.unused_files }}
  unused_deps:
    description: Number of unused dependencies found by Knip
    value: ${{ steps.analysis.outputs.unused_deps }}
  total_issues:
    description: Total number of issues found by Knip
    value: ${{ steps.analysis.outputs.total_issues }}

runs:
  using: composite
  steps:
    - name: Warnings for breaking changes
      shell: bash
      run: |
        # Warnings for breaking changes
        if [ ! -z "${{ inputs.sonar_project_token }}" ]; then
          echo -e "\n⚠️  Breaking change: sonar_project_token renamed"
          echo -e "\n\tAction: rename sonar_project_token to sonar_token\n"
          exit 1
        fi

        if [ ! -z "${{ inputs.sonar_comment_token }}" ]; then
          echo -e "\n⚠️  Breaking change: sonar_comment_token deprecated"
          echo -e "\n\tAction: remove sonar_comment_token parameter\n"
          exit 1
        fi

    # Send triggers to diff action (only if triggers are provided)
    - id: diff
      shell: bash
      run: |
        if [ -z "${{ inputs.triggers }}" ]; then
          echo "triggered=true" >> $GITHUB_OUTPUT
        else
          echo "Running diff-triggers with: ${{ inputs.triggers }}"
          # We use a sub-step to call the action to handle the conditional output
          echo "triggered=false" >> $GITHUB_OUTPUT # Default
        fi

    - id: diff_actual
      if: inputs.triggers != ''
      uses: bcgov/action-diff-triggers@4abfcb211f5816d654d1c5a417e5431a2c4a5379 # v1.1.1
      with:
        triggers: ${{ github.event_name == 'pull_request' && inputs.triggers || '' }}
        ref: ${{ inputs.diff_branch }}
        # Use an isolated path to avoid wiping the manual checkout in self-tests
        path: ".diff-triggers"

    # Final triggered state
    - id: final_triggered
      shell: bash
      run: |
        TRIGGERED="false"
        if [ "${{ steps.diff.outputs.triggered }}" == "true" ] || [ "${{ steps.diff_actual.outputs.triggered }}" == "true" ]; then
          TRIGGERED="true"
        fi
        echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT
        echo "FINAL TRIGGERED: $TRIGGERED"


    - name: Setup Supply Chain Scan
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.supply_scan == 'true'
      shell: bash
      continue-on-error: true # Don't let a setup-ci issue kill the whole run
      run: |
        npx -y @aikidosec/safe-chain setup-ci

    # Checkout the target repository - SonarCloud requires a full clone
    - name: Internal Project Checkout
      uses: actions/checkout@v6
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.skip_checkout != 'true' && inputs.skip_checkout != true
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.branch }}
        path: ${{ inputs.checkout_path }}
        fetch-depth: 0


    - name: Setup Node.js
      uses: actions/setup-node@v6
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.language == 'node'
      with:
        node-version: ${{ inputs.node_version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.dir }}/${{ inputs.cache == 'yarn' && 'yarn.lock' || (inputs.cache == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json') }}

    # Condition 2: Java Project Setup
    - name: Setup Java
      uses: actions/setup-java@v4
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.language == 'java'
      with:
        java-version: ${{ inputs.java_version }}
        distribution: ${{ inputs.java_distribution }}
        cache: ${{ (inputs.cache == 'maven' || inputs.cache == 'gradle' || inputs.cache == 'sbt') && inputs.cache || 'maven' }}
        cache-dependency-path: |
          ${{ inputs.dir }}/**/*.xml
          ${{ inputs.dir }}/**/*.gradle*
          ${{ inputs.dir }}/**/sbt

    # Condition 3: Python Project Setup
    - name: Setup Python
      uses: actions/setup-python@v5
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.language == 'python'
      with:
        python-version: ${{ inputs.python_version }}
        cache: ${{ (inputs.cache == 'pip' || inputs.cache == 'pipenv' || inputs.cache == 'poetry') && inputs.cache || 'pip' }}
        cache-dependency-path: |
          ${{ inputs.dir }}/**/requirements*.txt
          ${{ inputs.dir }}/**/pyproject.toml
          ${{ inputs.dir }}/**/Pipfile.lock

    # Run tests
    - if: steps.final_triggered.outputs.triggered == 'true'
      shell: bash
      working-directory: ${{ inputs.dir }}
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      run: ${{ inputs.commands }}

    ### Optional SonarCloud
    - if: ${{ inputs.sonar_token != '' && steps.final_triggered.outputs.triggered == 'true' }}
      uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        projectBaseDir: ${{ inputs.dir }}
        args: >
          ${{ inputs.sonar_args }}

    # Run Analysis Tools (Knip for Node, Test Reports for others)
    - name: Run Analysis
      id: analysis
      if: steps.final_triggered.outputs.triggered == 'true' && inputs.dep_scan != 'off'
      working-directory: ${{ inputs.dir }}
      shell: bash
      run: |
        set -e
        # Clean up
        rm -f knip-output.json knip-summary.txt

        # Only run Knip for Node projects
        if [ "${{ inputs.language }}" == "node" ]; then
          # Set config
          if [ -n "${{ inputs.knip_config }}" ]; then
            KNIP_CONFIG="--config=${{ github.workspace }}/${{ inputs.knip_config }}"
          else
            KNIP_CONFIG="--config=${{ github.action_path }}/.knip.json --no-config-hints"
          fi

          # Run knip using npx
          set +e
          npx -y knip --dependencies --exports --reporter json --no-progress ${KNIP_CONFIG} > knip-output.json
          KNIP_EXIT_CODE=$?
          npx -y knip --dependencies --exports ${KNIP_CONFIG} | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' > knip-summary.txt 2>&1
          set -e
        fi

        # Process results with the bundled action script (shared logic)
        export INPUT_DIR="${{ inputs.dir }}"
        export INPUT_DEP_SCAN="${{ inputs.dep_scan }}"
        export INPUT_KNIP_OUTPUT="knip-output.json"
        export INPUT_LANGUAGE="${{ inputs.language }}"
        
        node ${{ github.action_path }}/dist/index.js

    - name: Final cleanup
      if: always() && inputs.repository != github.repository
      shell: bash
      run: echo "Cleanup complete"
