name: Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        name:
          [
            backend-triggered,
            backend-not-triggered,
            frontend-basic,
            frontend-no-triggers,
            waste-frontend,
          ]
        include:
          - name: backend-triggered
            dir: backend
            triggers: "('./')"
            expected_triggered: true
            dep_scan: warn
            test_command: npm run test:cov
            repository: bcgov/quickstart-openshift
          - name: backend-not-triggered
            dir: backend
            triggers: "('backend/')"
            expected_triggered: false
            dep_scan: warn
            test_command: npm run test:cov
            repository: bcgov/quickstart-openshift
          - name: frontend-basic
            dir: frontend
            triggers: "('./')"
            expected_triggered: true
            dep_scan: warn
            test_command: npm run test:cov
            repository: bcgov/quickstart-openshift
          - name: frontend-no-triggers
            dir: frontend
            expected_triggered: true
            dep_scan: off
            test_command: npm run test:cov
            repository: bcgov/quickstart-openshift
          - name: waste-frontend
            dir: frontend
            expected_triggered: true
            dep_scan: warn
            test_command: echo "Good enough for testing knip!"
            repository: bcgov/nr-waste-plus
    steps:
      - name: Checkout Action
        uses: actions/checkout@v6
        with:
          path: .github/actions/test-and-analyse

      # Checkout the target repository into the root - SonarCloud/Action expects it there
      - name: Checkout Target Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          # Do NOT use clean: true here, we need to keep the action folder alive
          clean: false

      - name: Get Node.js version from package.json
        id: node-version
        working-directory: .github/actions/test-and-analyse
        run: |
          set -e
          NODE_VERSION=$(jq -r '.engines.node // empty' package.json | sed 's/>=//' | cut -d. -f1)
          if [ -z "$NODE_VERSION" ]; then
            echo "node_version=20" >> "$GITHUB_OUTPUT"
          else
            echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - id: action
        uses: ./.github/actions/test-and-analyse
        with:
          commands: |
            npm ci
            ${{ matrix.test_command }}
          dir: ${{ matrix.dir }}
          node_version: ${{ steps.node-version.outputs.node_version }}
          repository: ${{ matrix.repository }}
          triggers: ${{ matrix.triggers }}
          dep_scan: ${{ matrix.dep_scan }}
          skip_checkout: "true"

      - name: Verify trigger behavior
        run: |
          echo "🔍 Verifying trigger behavior for ${{ matrix.name }}"
          if [ "${{ steps.action.outputs.triggered }}" != "${{ matrix.expected_triggered }}" ]; then
            echo "❌ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
            exit 1
          fi
          echo "✅ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
