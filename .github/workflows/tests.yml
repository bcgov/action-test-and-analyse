name: Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        name: [backend-triggered, backend-not-triggered, frontend-basic]
        include:
          - name: backend-triggered
            dir: backend
            triggers: "('./')"
            expected_triggered: true
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
          - name: backend-not-triggered
            dir: backend
            triggers: "('backend/')"
            expected_triggered: false
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
          - name: frontend-basic
            dir: frontend
            triggers: "('./')"
            expected_triggered: true
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
    steps:
      # Checkout the target repository into the root
      - name: Checkout Target Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}

      # Checkout the action into a subdirectory
      - name: Checkout Action
        uses: actions/checkout@v6
        with:
          path: local-action
          # We need at least the current branch's code
          ref: ${{ github.event.pull_request.head.sha }}

      - id: action
        uses: ./local-action
        with:
          commands: |
            npm ci
            ${{ matrix.test_command }}
          dir: ${{ matrix.dir }}
          node_version: "22"
          repository: ${{ matrix.repository }}
          triggers: ${{ matrix.triggers }}
          skip_checkout: "true"

      - name: Verify trigger behavior
        run: |
          echo "🔍 Verifying trigger behavior for ${{ matrix.name }}"
          if [ "${{ steps.action.outputs.triggered }}" != "${{ matrix.expected_triggered }}" ]; then
            echo "❌ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
            exit 1
          fi
          echo "✅ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
