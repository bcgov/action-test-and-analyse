name: Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        name: [backend-triggered, backend-not-triggered, frontend-basic]
        include:
          - name: backend-triggered
            dir: backend
            triggers: "('./')"
            expected_triggered: true
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
          - name: backend-not-triggered
            dir: backend
            triggers: "('backend/')"
            expected_triggered: false
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
          - name: frontend-basic
            dir: frontend
            triggers: "('./')"
            expected_triggered: true
            repository: bcgov/quickstart-openshift
            test_command: npm run test:cov
    steps:
      # 1. Checkout the Action (this repo) into a subfolder
      - name: Checkout Action
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: action-v1

      # 2. Checkout the Target Repository into a subfolder
      # We do this manually here for triggers verification purposes
      - name: Checkout Target Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          path: test-project

      # 3. Use the local action (./action-v1) to analyze the project
      - id: action
        uses: ./action-v1
        with:
          commands: |
            npm ci
            ${{ matrix.test_command }}
          # Point the action to the subfolder where the project is
          dir: test-project/${{ matrix.dir }}
          node_version: "22"
          repository: ${{ matrix.repository }}
          triggers: ${{ matrix.triggers }}
          # Skip internal checkout since we did it above
          skip_checkout: "true"

      - name: Verify trigger behavior
        run: |
          echo "🔍 Verifying trigger behavior for ${{ matrix.name }}"
          if [ "${{ steps.action.outputs.triggered }}" != "${{ matrix.expected_triggered }}" ]; then
            echo "❌ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
            exit 1
          fi
          echo "✅ ${{ matrix.name }}: expected triggered=${{ matrix.expected_triggered }}, got ${{ steps.action.outputs.triggered }}"
